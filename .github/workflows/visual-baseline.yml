name: Update Visual Baseline

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter statekit build

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate baseline screenshots
        working-directory: apps/web
        run: pnpm exec playwright test --update-snapshots

      # Opens a PR rather than committing straight to main, so a generated baseline
      # (which could hide a real bug if the run was botched) gets a quick look before merging.
      - name: Open PR with the updated baseline
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "test: update visual regression baseline"
          title: "Update visual regression baseline"
          body: Generated by the "Update Visual Baseline" workflow (manually triggered).
          branch: visual-baseline-update
          add-paths: apps/web/tests/**/*-snapshots/**
